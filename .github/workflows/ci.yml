name: Deepiri CI - diri-helox

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Type Check, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # pyproject.toml uses path = "../../deepiri-gpu-utils" and "../../deepiri-dataset-processor"
      # (resolved from .../work/diri-helox/diri-helox → .../work/<name>). GITHUB_TOKEN cannot read other
      # private org repos (clone returns "Repository not found"). Use org/repo secret DEEPIRI_CI_CLONE_PAT:
      # fine-grained PAT with Contents: Read on deepiri-gpu-utils + deepiri-dataset-processor (or classic repo scope).
      - name: Checkout path dependencies (monorepo siblings)
        env:
          CLONE_TOKEN: ${{ secrets.DEEPIRI_CI_CLONE_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${CLONE_TOKEN}" ]; then
            echo "::error::Secret DEEPIRI_CI_CLONE_PAT is not set. Add it (org or repo) with read access to Team-Deepiri/deepiri-gpu-utils and Team-Deepiri/deepiri-dataset-processor."
            exit 1
          fi
          ROOT="$(cd "${GITHUB_WORKSPACE}/../.." && pwd)"
          echo "Sibling root: ${ROOT}"
          clone() {
            local org_repo="$1"
            local dest_name="$2"
            local dest="${ROOT}/${dest_name}"
            if [ -d "${dest}/.git" ]; then
              echo "Already present: ${dest}"
              return 0
            fi
            git clone --depth 1 "https://x-access-token:${CLONE_TOKEN}@github.com/${org_repo}.git" "${dest}"
          }
          clone "Team-Deepiri/deepiri-gpu-utils" "deepiri-gpu-utils"
          clone "Team-Deepiri/deepiri-dataset-processor" "deepiri-dataset-processor"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Poetry
        run: pip install poetry

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install --with dev

      - name: Lint (ruff)
        run: poetry run ruff check .

      - name: Format check (black)
        run: poetry run black --check .

      - name: Type check (mypy)
        run: poetry run mypy .

      - name: Unit tests (pytest)
        run: poetry run pytest -m "not integration"

      - name: Integration tests (pytest)
        run: poetry run pytest -m integration

      - name: Build package
        run: poetry build