name: Deepiri CI - diri-helox

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Type Check, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Poetry
        run: pip install poetry

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install --with dev

      - name: Lint (ruff, sidecar scope)
        run: |
          poetry run ruff check --select E9,F63,F7,F82 \
            integrations/synapse_event_publisher.py \
            integrations/streaming/gen/proto/synapse/v1/sidecar_pb2.py \
            integrations/streaming/gen/proto/synapse/v1/sidecar_pb2_grpc.py

      - name: Syntax check (py_compile, sidecar scope)
        run: |
          python -m py_compile \
            integrations/synapse_event_publisher.py \
            integrations/streaming/gen/proto/synapse/v1/sidecar_pb2.py \
            integrations/streaming/gen/proto/synapse/v1/sidecar_pb2_grpc.py

      - name: Build package
        run: poetry build
