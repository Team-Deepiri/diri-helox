name: Deepiri CI - diri-helox

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Type Check, Test & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Init submodules
        run: |
          set -euo pipefail
          # Clone private Team-Deepiri submodules over HTTPS.
          #
          # NOTE: `GITHUB_TOKEN` typically cannot read *other* private repos, so we prefer a PAT
          # like `DEEPIRI_CI_CLONE_PAT` (repo read) when available.
          TOKEN="${{ secrets.DEEPIRI_CI_CLONE_PAT || secrets.GITHUB_TOKEN }}"

          # Rewrite SSH/HTTPS GitHub URLs to token-authenticated HTTPS (--add keeps all rules).
          git config --global --add url."https://x-access-token:${TOKEN}@github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://x-access-token:${TOKEN}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global --add url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"

          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Poetry
        run: pip install poetry

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true
          poetry config system-git-client true

      - name: Install dependencies
        run: |
          poetry install --with dev

      - name: Lint (ruff)
        run: poetry run ruff check .

      - name: Format check (black)
        run: poetry run black --check .

      - name: Type check (mypy)
        run: poetry run mypy data_sources pipelines/training/dynamic_training_pipeline.py training/intent_classifier_trainer.py evaluation/model_evaluator.py scripts/pipelines/run_dynamic_pipeline.py

      - name: Unit tests (pytest)
        run: poetry run pytest -m "not integration and not slow"

      - name: Helox SDK tests (pytest)
        run: |
          cd helox_sdk
          poetry install
          poetry run pytest

      - name: Integration tests (pytest)
        run: |
          poetry run pytest -m integration || { code=$?; [ "$code" -eq 5 ] && exit 0 || exit "$code"; }

      # package-mode = false: no sdist/wheel; validate pyproject + lock instead.
      - name: Validate Poetry project
        run: poetry check
