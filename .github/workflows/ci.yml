name: Deepiri CI - diri-helox

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Type Check, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Poetry
        run: pip install poetry

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install --with dev --no-root

      - name: Determine changed Python files
        id: changed_python
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
            files="$(git diff --name-only --diff-filter=ACMRT "$base_sha" "$head_sha" | grep -E '\.py$' || true)"
          else
            files="$(git diff --name-only --diff-filter=ACMRT HEAD~1 HEAD | grep -E '\.py$' || true)"
          fi

          files="$(echo "$files" | grep -v '^deepiri-dataset-processor/' || true)"
          files="$(echo "$files" | xargs || true)"

          echo "files=$files" >> "$GITHUB_OUTPUT"
          if [ -n "$files" ]; then
            echo "Changed Python files: $files"
          else
            echo "No changed Python files detected."
          fi

      - name: Determine changed test files
        id: changed_tests
        run: |
          set -euo pipefail
          tests="$(echo '${{ steps.changed_python.outputs.files }}' | tr ' ' '\n' | grep -E '(^tests/.*\.py$|(^|.*/)test_.*\.py$)' || true)"
          tests="$(echo "$tests" | xargs || true)"
          echo "files=$tests" >> "$GITHUB_OUTPUT"

      - name: Lint (ruff)
        if: steps.changed_python.outputs.files != ''
        run: poetry run ruff check ${{ steps.changed_python.outputs.files }}

      - name: Format check (black)
        if: steps.changed_python.outputs.files != ''
        run: poetry run black --check ${{ steps.changed_python.outputs.files }}

      - name: Type check (mypy)
        if: steps.changed_python.outputs.files != ''
        run: poetry run mypy ${{ steps.changed_python.outputs.files }}

      - name: Unit tests (pytest)
        if: steps.changed_tests.outputs.files != ''
        run: poetry run pytest -m "not integration" ${{ steps.changed_tests.outputs.files }}

      - name: Integration tests (pytest)
        if: steps.changed_tests.outputs.files != ''
        run: poetry run pytest -m integration ${{ steps.changed_tests.outputs.files }}

      - name: Smoke check changed Python files
        if: steps.changed_python.outputs.files != ''
        run: poetry run python -m py_compile ${{ steps.changed_python.outputs.files }}

      - name: Poetry project check
        run: poetry check
