name: diri-helox-codeql-config

# Focus analysis on maintained Python modules, pipelines, and tests.
# NOTE: list directories only — individual .py files must NOT appear here;
# CodeQL's autobuild walks each entry as a directory and crashes on files.
paths:
  - core
  - data_management
  - data_processing
  - data_safety
  - data_sources
  - evaluation
  - examples
  - experiments
  - integrations
  - mlops
  - model_export
  - model_management
  - observability
  - pipelines
  - scripts
  - tests
  - tokenization
  - train
  - training
  - utils

# Exclude generated/build/cache/runtime, standalone test scripts, and heavy data artifacts.
paths-ignore:
  - '**/__pycache__/**'
  - '**/.pytest_cache/**'
  - '**/.mypy_cache/**'
  - '**/.venv/**'
  - '**/venv/**'
  - '**/dist/**'
  - '**/build/**'
  - '**/htmlcov/**'
  - '**/.tox/**'
  - '**/notebooks/**'
  - '**/tmp/**'
  - '**/data/**'
  - '**/datasets/**'
  - '**/mlruns/**'
  - '**/*.ipynb'
  - '**/*.min.js'
